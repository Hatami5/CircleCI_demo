version: 2.1

jobs:
  build:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run: python app.py

  tests:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run: python test.py

  deploy:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run: echo "Deploying the application"

workflows:
  build_now:
    jobs:
      - build
      - tests:
          requires:
            - build
      - deploy:
          requires:
            - tests
          filters:
            branches:
              only: main